# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode-tunnel
  namespace: vscode-tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vscode-tunnel
  template:
    metadata:
      labels:
        app: vscode-tunnel
    spec:
      containers:
        - name: vscode-tunnel
          image: mcr.microsoft.com/devcontainers/dotnet
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              mkdir -p /config/.vscode-cli /config/.vscode-serverdata
              if ! command -v code >/dev/null 2>&1; then
                mkdir -p /tmp/vscode-cli
                curl -Lk 'https://code.visualstudio.com/sha/download?build=stable&os=cli-linux-x64' \
                  --output /tmp/vscode_cli.tar.gz
                tar -xf /tmp/vscode_cli.tar.gz -C /tmp/vscode-cli
                CODE_PATH="$(find /tmp/vscode-cli -type f -name code | head -n 1)"
                if [ -n "$CODE_PATH" ]; then
                  chmod +x "$CODE_PATH"
                  ln -sf "$CODE_PATH" /usr/local/bin/code
                fi
              fi
              CODE_BIN="$(command -v code || command -v code-insiders || true)"
              if [ -z "$CODE_BIN" ]; then
                echo "code or code-insiders is not installed" >&2
                exit 1
              fi
              exec "$CODE_BIN" tunnel \
                --accept-server-license-terms \
                --name gembercluster \
                --cli-data-dir /config/.vscode-cli \
                --server-data-dir /config/.vscode-serverdata
          env:
            - name: HOME
              value: /config
            - name: XDG_CONFIG_HOME
              value: /config/.config
          volumeMounts:
            - name: data
              mountPath: /workspace
              subPath: workspace
            - name: data
              mountPath: /config
              subPath: config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vscode-tunnel-pvc-longhorn
