apiVersion: apps/v1
kind: Deployment
metadata:
  name: armabotcs
  namespace: armabotcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: armabotcs
  template:
    metadata:
      labels:
        app: armabotcs
    spec:
      imagePullSecrets:
        - name: ghcr-login
      containers:
        - name: armabotcs
          image: ghcr.io/gemberkoekje/armabotcs:1.0.0-58
          command: ["dotnet", "ArmaBotCs.dll"] # <-- Add this line (replace with your actual entrypoint)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # Note: no HTTP probes since this is a Discord bot with no HTTP server.
          # Kubernetes will restart the pod if the dotnet process exits.
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: postgress-secret
                  key: connectionstring
            - name: Discord__Token
              valueFrom:
                secretKeyRef:
                  name: discord-secret
                  key: token
