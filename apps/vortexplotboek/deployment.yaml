apiVersion: apps/v1
kind: Deployment
metadata:
  name: vortexplotboek
  namespace: vortexplotboek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vortexplotboek
  template:
    metadata:
      labels:
        app: vortexplotboek
    spec:
      imagePullSecrets:
        - name: gitlab-login
      containers:
        - name: vortexplotboek
          image: registry.gitlab.com/vortexadventures/plotboek-generator:1.0.0-42
          command: ["dotnet", "PlotboekGenerator.Vortex.WebApp.dll"] # <-- Add this line (replace with your actual entrypoint)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 18
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 20
          resources:
            requests:
              memory: "1536Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: postgress-vortexplotboek-secret
                  key: connectionstring
            - name: Discord__Token
              valueFrom:
                secretKeyRef:
                  name: discord-secret
                  key: token
            - name: BearerConfiguration__Key
              valueFrom:
                secretKeyRef:
                  name: bearer-secret
                  key: key
            - name: Authentication__Google__ClientId
              valueFrom:
                secretKeyRef:
                  name: oauth-google-vortexplotboek-secret
                  key: client-id
            - name: Authentication__Google__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: oauth-google-vortexplotboek-secret
                  key: client-secret
            - name: Authentication__Microsoft__ClientId
              valueFrom:
                secretKeyRef:
                  name: oauth-microsoft-vortexplotboek-secret
                  key: client-id
            - name: Authentication__Microsoft__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: oauth-microsoft-vortexplotboek-secret
                  key: client-secret
            - name: GoogleDrive__RefreshToken
              valueFrom:
                secretKeyRef:
                  name: oauth-google-refreshtoken
                  key: RefreshToken
            - name: GoogleDrive__SyncApiKey
              valueFrom:
                secretKeyRef:
                  name: sync-api-key
                  key: key
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Gemini__ApiKey
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: apikey
