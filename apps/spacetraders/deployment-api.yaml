apiVersion: apps/v1
kind: Deployment
metadata:
  name: spacetraders-api
  namespace: spacetraders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spacetraders-api
  template:
    metadata:
      labels:
        app: spacetraders-api
    spec:
      imagePullSecrets:
        - name: ghcr-login
      containers:
        - name: spacetraders-api
          image: ghcr.io/gemberkoekje/spacetraders-api:74c640e34493603577c145f2913e227ec88b1f06
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          envFrom:
            - configMapRef:
                name: spacetraders-config
            - secretRef:
                name: spacetraders-secrets
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            failureThreshold: 120
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
