# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-server
  namespace: file-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-server
  template:
    metadata:
      labels:
        app: file-server
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /pvc/files /pvc/config
              chown -R 1000:1000 /pvc/files /pvc/config
              chmod -R ug+rwX /pvc/files /pvc/config
          volumeMounts:
            - name: files
              mountPath: /pvc
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          imagePullPolicy: Always
          args:
            - --root=/srv
            - --port=8080
            - --baseurl=/fileserver
            - --database=/config/filebrowser.db
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: files
              mountPath: /srv
              subPath: files
            - name: files
              mountPath: /config
              subPath: config
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: file-server-pvc-longhorn
