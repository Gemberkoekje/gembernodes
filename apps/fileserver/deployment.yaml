# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-server
  namespace: file-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-server
  template:
    metadata:
      labels:
        app: file-server
    spec:
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          args:
            - --root=/srv
            - --port=8080
            - --baseurl=/fileserver
            - --database=/config/filebrowser.db
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: files
              mountPath: /srv
              subPath: files
            - name: files
              mountPath: /config
              subPath: config
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: file-server-pvc
