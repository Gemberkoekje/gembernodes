# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-server
  namespace: file-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-server
  template:
    metadata:
      labels:
        app: file-server
    spec:
      containers:
        - name: filebrowser
          # TODO: pin to specific version - check running pod first:
          # kubectl get pod -n file-server -o jsonpath='{.items[0].spec.containers[0].image}'
          image: filebrowser/filebrowser:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          args:
            - --root=/srv
            - --port=8080
            - --baseurl=/fileserver
            - --database=/config/filebrowser.db
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /fileserver/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /fileserver/
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: files
              mountPath: /srv
              subPath: files
            - name: files
              mountPath: /config
              subPath: config
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: file-server-pvc
