apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vortexplotboek-ingress
  namespace: vortexplotboek
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # OIDC login (SaveTokens) sets large chunked auth cookies on /signin-oidc; the default
    # proxy buffer is too small for those response headers and nginx returns 502
    # ("upstream sent too big header"). Enlarge the header/response buffers.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx-public
  tls:
  - hosts:
    - gemberkoekje.nl
    - vortexplotboek.gemberkoekje.nl
    secretName: ebi-cs-api-tls
  rules:
  - host: gemberkoekje.nl
    http:
      paths:
      - path: /vortexplotboek
        pathType: Prefix
        backend:
          service:
            name: vortexplotboek-service
            port:
              number: 80
  - host: vortexplotboek.gemberkoekje.nl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vortexplotboek-service
            port:
              number: 80
              