apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dockhand-internal
  namespace: dockhand
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.0.0/16,10.0.0.0/8"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx-public
  rules:
    - http:
        paths:
          - path: /dockhand(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dockhand
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dockhand-assets-internal
  namespace: dockhand
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.0.0/16,10.0.0.0/8"
spec:
  ingressClassName: nginx-public
  rules:
    - http:
        paths:
          - path: /_app
            pathType: Prefix
            backend:
              service:
                name: dockhand
                port:
                  number: 80
          - path: /favicon-32x32.png
            pathType: Exact
            backend:
              service:
                name: dockhand
                port:
                  number: 80
          - path: /favicon-16x16.png
            pathType: Exact
            backend:
              service:
                name: dockhand
                port:
                  number: 80
          - path: /site.webmanifest
            pathType: Exact
            backend:
              service:
                name: dockhand
                port:
                  number: 80
