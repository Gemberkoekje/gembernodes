apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-internal
  namespace: longhorn-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx-public
  rules:
    - host: 192.168.1.201
      http:
        paths:
          - path: /longhorn
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
