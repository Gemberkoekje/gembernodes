apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: flux-system
spec:
  interval: 11m
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: postgresql-chart
    namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: postgresql-admin-secret
      valuesKey: postgresPassword
      targetPath: global.postgresql.auth.postgresPassword
  values:
    primary:
      resourcesPreset: "none"
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
      # Keep PostgreSQL memory usage bounded for small clusters.
      extendedConfiguration: |
        shared_buffers = 256MB
        work_mem = 4MB
        maintenance_work_mem = 64MB
        effective_cache_size = 768MB
        # Keep WAL growth bounded so disk usage is more predictable.
        max_wal_size = 2GB
        min_wal_size = 256MB
        checkpoint_timeout = 10min
        checkpoint_completion_target = 0.9
        wal_compression = on
      service:
        type: ClusterIP
      persistence:
        enabled: true
        existingClaim: postgresql-data-qnap