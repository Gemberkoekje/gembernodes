apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: flux-system
spec:
  interval: 11m
  chartRef:
    kind: OCIRepository
    name: postgresql-chart
    namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: postgresql-admin-secret
      valuesKey: postgresPassword
      targetPath: global.postgresql.auth.postgresPassword
  values:
    primary:
      service:
        type: ClusterIP
      persistence:
        enabled: true
        size: 8Gi
        storageClass: "longhorn" # Set to your desired StorageClass, or leave empty for default