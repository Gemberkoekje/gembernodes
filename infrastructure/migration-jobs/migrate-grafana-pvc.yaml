# ONE-TIME migration: copies Grafana data from local-path to Longhorn.
#
# Steps:
#   1. Scale Grafana down:  kubectl scale deploy grafana -n monitoring --replicas=0
#   2. Apply this file:     kubectl apply -f migrate-grafana-pvc.yaml
#   3. Wait for completion: kubectl wait job/migrate-grafana -n monitoring --for=condition=complete --timeout=300s
#   4. Update grafana-release.yaml persistence.storageClassName to "longhorn" and persistence.existingClaim to "grafana-longhorn"
#   5. Commit and let Flux reconcile (Grafana will mount the new PVC)
#   6. Verify Grafana is healthy, then delete the old PVC:
#      kubectl delete pvc grafana -n monitoring
#   7. Clean up: kubectl delete -f migrate-grafana-pvc.yaml
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-longhorn
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-grafana
  namespace: monitoring
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync
              echo "Starting migration..."
              rsync -av /source/ /target/
              echo "Migration complete."
              ls -lah /target/
          volumeMounts:
            - name: source
              mountPath: /source
            - name: target
              mountPath: /target
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: grafana
        - name: target
          persistentVolumeClaim:
            claimName: grafana-longhorn
