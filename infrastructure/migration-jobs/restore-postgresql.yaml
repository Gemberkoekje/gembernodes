# ONE-TIME restore job. Run after PostgreSQL is up on Longhorn.
# Apply:  kubectl apply -f infrastructure/migration-jobs/restore-postgresql.yaml
# Watch:  kubectl logs -n flux-system -l job-name=restore-postgresql -f
# Cleanup: kubectl delete -f infrastructure/migration-jobs/restore-postgresql.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: restore-postgresql
  namespace: flux-system
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              set -e
              DUMP=$(ls /backup/postgres-*.sql.gz | sort | tail -1)
              echo "Restoring from $DUMP..."
              zcat "$DUMP" | psql -h postgresql -U postgres --set ON_ERROR_STOP=0
              echo "Restore complete. Databases:"
              psql -h postgresql -U postgres -c "\l"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-admin-secret
                  key: postgresPassword
          volumeMounts:
            - name: backup
              mountPath: /backup
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: postgresql-backup-pvc
