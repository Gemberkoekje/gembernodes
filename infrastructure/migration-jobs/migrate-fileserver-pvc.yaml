# ONE-TIME migration: copies fileserver data from local-path to Longhorn.
#
# Steps:
#   1. Scale fileserver down: kubectl scale deploy file-server -n file-server --replicas=0
#   2. Apply this file:        kubectl apply -f migrate-fileserver-pvc.yaml
#   3. Wait for completion:    kubectl wait job/migrate-fileserver -n file-server --for=condition=complete --timeout=600s
#   4. Update infrastructure/pvcs/fileserver.yaml:
#      - Change name to "file-server-pvc-longhorn" (or keep old name after deleting old PVC)
#      - Add storageClassName: longhorn
#      - Update apps/fileserver/deployment.yaml claimName to match
#   5. Commit and let Flux reconcile
#   6. Verify fileserver is healthy, then delete old PVC:
#      kubectl delete pvc file-server-pvc -n file-server
#   7. Clean up: kubectl delete -f migrate-fileserver-pvc.yaml
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: file-server-pvc-longhorn
  namespace: file-server
  annotations:
    longhorn.io/volume-number-of-replicas: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-fileserver
  namespace: file-server
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync
              echo "Starting migration..."
              rsync -av /source/ /target/
              echo "Migration complete."
              echo "Source size:"; du -sh /source/
              echo "Target size:"; du -sh /target/
          volumeMounts:
            - name: source
              mountPath: /source
            - name: target
              mountPath: /target
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: file-server-pvc
        - name: target
          persistentVolumeClaim:
            claimName: file-server-pvc-longhorn
