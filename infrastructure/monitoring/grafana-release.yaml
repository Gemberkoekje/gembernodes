# grafana-release.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      version: "8.x"
  interval: 6m
  values:
    replicaCount: 1   # <-- Add this line
    admin:
      existingSecret: grafana-secret
      userKey: user
      passwordKey: password
    service:
      type: ClusterIP
    ingress:
      enabled: false
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: "longhorn"
      accessModes:
        - ReadWriteOnce
      existingClaim: grafana-longhorn
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/grafana/"
        serve_from_sub_path: true
      smtp:
        enabled: true
        host: smtp.gmail.com:587
        user: gemberkoekje@gmail.com
        password: $__env{SMTP_PASSWORD}
        from_address: gemberkoekje@gmail.com
        from_name: Gembercluster
        startTLS_policy: MandatoryStartTLS
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            access: proxy
            url: http://prometheus-server.monitoring.svc.cluster.local:80
            isDefault: true
          - name: grafana-Loki
            type: loki
            uid: grafana-loki
            access: proxy
            url: http://grafana-loki.monitoring.svc.cluster.local:3100
            isDefault: false
    alerting:
      contactpoints.yaml:
        apiVersion: 1
        contactPoints:
          - orgId: 1
            name: Email
            receivers:
              - uid: email-receiver
                type: email
                settings:
                  addresses: Arie_Hofland@hotmail.com
                  singleEmail: true
      policies.yaml:
        apiVersion: 1
        policies:
          - orgId: 1
            receiver: Email
            group_by: ['namespace', 'alertname']
            group_wait: 1m
            group_interval: 5m
            repeat_interval: 12h
      rules.yaml:
        apiVersion: 1
        groups:
          - orgId: 1
            name: error-logs
            folder: Alerts
            interval: 5m
            rules:
              - uid: loki-error-logs
                title: Error logs detected
                condition: A
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 300
                      to: 0
                    datasourceUid: grafana-loki
                    model:
                      expr: 'sum(count_over_time({namespace=~"armabotcs|ebi-cs-api|vortexplotboek|cov-website|file-server"} |~ `(?i)error` [5m]))'
                      queryType: range
                      refId: A
                noDataState: OK
                execErrState: Error
                for: 5m
                annotations:
                  summary: "Error logs detected in {{ $labels.namespace }}"
    plugins:
      - grafana-piechart-panel
    initChownData:
      enabled: false
    envFromSecret: grafana-smtp-secret
    env:
      GF_SECRETS_ENCRYPTION_PROVIDER: ""